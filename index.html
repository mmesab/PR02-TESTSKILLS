<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdentityMap Nexus 2026/title>
        <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!--Hero Section-->
    <section class="hero">
        <h1>IdentityMap Nexus 2026</h1>
        <p>
            Sistema avanzado de patrones motivacionales inspirado en modelos tipológicos modernos.
            Diseñado para analizar motivación, identidad, necesidades psicológicas,
            comportamiento adaptativo y gestión emocional.
        </p>
    </section>

    <!--Test-->

    <!--FASE 1 - MOTIVACIÓN INTERNA-->
    <section class="test-section">
        <div class="question">
            <h3>1 - ¿Qué suele impulsarte más?</h2>
                <div class="options">
                    <div class="option">A — Mejorar constantemente.</div>
                    <div class="option">B — Sentirme conectado con personas.</div>
                    <div class="option">C — Lograr resultados importantes.</div>
                    <div class="option">D — Ser auténtico conmigo mismo.</div>
                </div>
        </div>

        <div class="question">
            <h3>2 - ¿Pregunta 2?</h2>
                <div class="options">
                    <div class="option">1 — Me adapto sin grandes objetivos internos.</div>
                    <div class="option">2 — Tengo motivaciones variables.</div>
                    <div class="option">3 — Tengo metas internas claras.</div>
                    <div class="option">4 — Mi motivación interna dirige fuertemente mis decisiones.</div>
                </div>
        </div>

        <div class="question">
            <h3>3 - Cuando algo no sale como esperabas:</h2>
                <div class="options">
                    <div class="option">A — Intento corregirlo rápidamente.</div>
                    <div class="option">B — Busco apoyo emocional.</div>
                    <div class="option">C — Me enfoco en recuperar resultados.</div>
                    <div class="option">D — Reflexiono profundamente.</div>
                </div>
        </div>

        <div class="question">
            <h3>4 - ¿Qué suele preocuparte más?</h2>
                <div class="options">
                    <div class="option">A — Cometer errores.</div>
                    <div class="option">B — Sentirme rechazado.</div>
                    <div class="option">C — Fracasar.</div>
                    <div class="option">D — Perder identidad personal.</div>
                </div>
        </div>

        <div class="question">
            <h3>5 - ¿Qué describe mejor tu impulso principal?</h2>
                <div class="options">
                    <div class="option">A — Mejora.</div>
                    <div class="option">B — Conexión.</div>
                    <div class="option">C — Éxito.</div>
                    <div class="option">D — Autenticidad.</div>
                </div>
        </div>
<!--FASE 2 - RELACIÓN CON EL ENTORNO-->
        <div class="question">
            <h3>6 -  Cuando llegas a un grupo nuevo: </h2>
                <div class="options">
                    <div class="option">A — Observo normas y funcionamiento.</div>
                    <div class="option">B — Intento conectar rápidamente.</div>
                    <div class="option">C — Busco destacar.</div>
                    <div class="option">D — Analizo personas y ambiente.</div>
                </div>
        </div>

        <div class="question">
            <h3>7 - Pregunta 7</h2>
                <div class="options">
                    <div class="option">1 — Evito implicarme demasiado.</div>
                    <div class="option">2 — Conecto parcialmente.</div>
                    <div class="option">3 — Depende del entorno.</div>
                    <div class="option">4 — Me adapto socialmente.</div>
                    <div class="option">5 — Necesito sentir conexión significativa.</div>
                </div>
        </div>

        <div class="question">
            <h3>8 - Cuando existe conflicto: </h2>
                <div class="options">
                    <div class="option">1 — Evito implicarme demasiado.</div>
                    <div class="option">2 — Conecto parcialmente.</div>
                    <div class="option">3 — Depende del entorno.</div>
                    <div class="option">4 — Me adapto socialmente.</div>
                    <div class="option">5 — Necesito sentir conexión significativa.</div>
                </div>
        </div>

    </section>

    <script src="script.js"></script>
</body>

</html>
